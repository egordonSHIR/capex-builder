<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="theme-color" content="#1d2d47" />
<title>Capex Builder</title>
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="app-header">
  <div class="brand">
    <button id="btn-back" class="btn-icon hidden" title="Properties">←</button>
    <img class="logo" src="logo.svg" alt="SHIR" />
    <span class="title" id="header-title">Capex Builder</span>
  </div>
  <div class="header-actions">
    <button id="btn-pull" class="btn-icon hidden" title="Pull from Drive">⬇</button>
    <button id="btn-push" class="btn-icon hidden" title="Push to Drive">⬆</button>
    <button id="btn-save" class="btn-icon hidden" title="Save">💾</button>
    <button id="btn-menu" class="btn-icon" title="Menu">☰</button>
  </div>
</header>

<div id="sync-bar" class="sync-bar hidden"></div>

<nav class="phase-tabs" id="phase-tabs">
  <button class="tab active" data-phase="1">1. Basics</button>
  <button class="tab" data-phase="2">2. Questionnaire</button>
  <button class="tab" data-phase="3">3. Details</button>
  <button class="tab" data-phase="4">4. Review &amp; Export</button>
</nav>

<main id="phase-content"></main>
<main id="home-content" class="hidden"></main>

<div id="menu-drawer" class="drawer hidden">
  <button class="drawer-close">✕</button>

  <div id="drawer-property-section">
    <h3>Property</h3>
    <button id="btn-find-folder">🔍 Find Drive Folder (by name/city)</button>
    <button id="btn-link-folder">Link Drive Folder by URL…</button>
    <div id="folder-status" class="muted small"></div>
    <button id="btn-rename">Rename</button>
    <button id="btn-delete">Delete Property</button>
    <hr/>
    <h3>Sync</h3>
    <button id="btn-push-drawer">Push to Drive</button>
    <button id="btn-pull-drawer">Pull from Drive</button>
    <div id="sync-status" class="muted small"></div>
    <button id="btn-export-xlsx">Export Excel → Drive</button>
    <button id="btn-export-json">Export JSON (download)</button>
    <hr/>
  </div>

  <h3>Dropdown Options</h3>
  <button id="btn-import-options">Import Options (XLSX)</button>
  <input type="file" id="file-import-options" accept=".xlsx,.xls" hidden />
  <button id="btn-reset-options">Reset to Defaults</button>
  <div id="options-status" class="muted small"></div>
  <hr/>
  <h3>Google Drive</h3>
  <button id="btn-drive-connect">Connect Google Drive</button>
  <div id="drive-status" class="muted small">Not connected</div>
  <hr/>
  <h3>AI Processing</h3>
  <button id="btn-set-anthropic-key">Set Anthropic API Key</button>
  <button id="btn-share-anthropic-key">Share Key Org-Wide (Drive)</button>
  <div id="anthropic-key-status" class="muted small">No key set</div>
  <hr/>
  <div class="muted small">v0.9 · multi-property</div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="schema.js"></script>
<script src="app.js"></script>
</body>
</html>
